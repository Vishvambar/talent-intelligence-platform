retrieval:
  top_k: 3000           # ⚠️ LOCKED — do not change without re-running phases 7A, 7B, 7C, 10, and 11
                         # Changing top_k cascades through: teacher cost, pairwise cost,
                         # reasoning bank size, and runtime. Treat as an architectural constant.
  dense_weight: 0.35      # INITIAL
  bm25_weight: 0.25       # INITIAL
  ontology_weight: 0.25   # INITIAL
  career_weight: 0.15     # INITIAL

faiss:
  index_type: IVF_PQ
  nlist: 512      # INITIAL
  m: 64           # INITIAL
  nbits: 8        # INITIAL
  nprobe: 50      # INITIAL

teacher:
  temperature: 0          # ✅ LOCKED
  runs_per_candidate: 3
  aggregation: median
  store_mean: true
  store_std: true
  store_confidence: true
  technical_weight: 0.45  # INITIAL
  evaluation_weight: 0.35 # INITIAL
  execution_weight: 0.20  # INITIAL

pairwise:
  pool_size: 300
  score_window: 15  # only compare if |score_a - score_b| < 15
  bidirectional_check: true
  conflict_resolution: absolute_score

ltr:
  learning_rate: 0.05
  num_leaves: 63
  max_depth: 8
  n_estimators: 500
  early_stopping_rounds: 50
  primary_model: lightgbm_huber
  challenger_models:
    - lightgbm_lambdarank
    - xgboost

ensemble:
  lgbm_weight: 0.6        # INITIAL
  xgb_weight: 0.4         # INITIAL

elite_rerank:
  pool_size: 20
  evaluation_weight: 0.30
  founding_team_weight: 0.25
  availability_weight: 0.20
  teacher_median_weight: 0.15
  teacher_std_penalty: 0.10

behavioral:
  # Availability score weights
  active_recency_weight: 0.40
  response_rate_weight: 0.30
  response_time_weight: 0.15
  notice_period_weight: 0.15
  offer_acceptance_weight: 0.10
  # Market demand weights
  saved_by_recruiters_multiplier: 3
  search_appearance_multiplier: 1
  profile_views_multiplier: 0.5
  # Thresholds
  inactive_baseline_days: 365
  max_response_hours: 168  # 1 week
  max_notice_days: 180    # 6 months

integrity:
  fraud_hard_remove_threshold: 0.98
  hard_remove_requires_severe_anomaly: true
  minor_anomaly_penalty: -2
  medium_anomaly_penalty: -5
  severe_anomaly_penalty: -25

label_quality:
  min_score_range: 60
  min_teacher_std: 5
  max_teacher_std: 25

reasoning:
  diversity_threshold: 0.95
  require_gap: true
  require_alignment: true
  require_numeric_evidence: true

runtime:
  max_runtime_seconds: 300
  max_memory_gb: 16

submission:
  top_n: 100
  normalize_scores: true
  require_unique_ids: true
  validate_before_export: true
